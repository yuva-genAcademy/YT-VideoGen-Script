<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Prompt Engineering</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: calc(100vw * 9 / 16);
      max-height: 100vh;
      max-width: calc(100vh * 16 / 9);
      overflow: hidden;
    }

    #scaler {
      position: absolute;
      top: 0; left: 0;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
    }

    iframe {
      border: none;
      width: 1920px;
      height: 1080px;
      display: block;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 10px 20px;
      z-index: 9999;
    }

    button {
      background: #FEFB41;
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
    }
    button:hover { background: #fff; }
    button:disabled { background: #555; color: #aaa; cursor: default; }

    #scrubber {
      width: 320px;
      accent-color: #FEFB41;
      cursor: pointer;
    }

    #timecode {
      color: #ccc;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      text-align: right;
    }

    #scene-label {
      color: #FEFB41;
      font-size: 12px;
      font-weight: 600;
      min-width: 160px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<div id="stage">
  <div id="scaler">
    <iframe id="comp" src="index.html"></iframe>
  </div>
</div>

<div id="controls">
  <span id="scene-label">Loading…</span>
  <button id="playBtn" disabled>▶ Play</button>
  <button id="restartBtn" disabled>↺ Restart</button>
  <input id="scrubber" type="range" min="0" max="248.8" step="0.1" value="0">
  <span id="timecode">0:00 / 4:08</span>
</div>

<script>
  // ── Scale the 1920×1080 stage to fill the viewport ──────────────────────
  const stage  = document.getElementById('stage');
  const scaler = document.getElementById('scaler');

  function rescale() {
    const sw = stage.clientWidth;
    const sh = stage.clientHeight;
    const scale = Math.min(sw / 1920, sh / 1080);
    scaler.style.transform = `scale(${scale})`;
    // Centre if letterboxed
    scaler.style.left = ((sw - 1920 * scale) / 2) + 'px';
    scaler.style.top  = ((sh - 1080 * scale) / 2) + 'px';
  }
  rescale();
  window.addEventListener('resize', rescale);

  // ── Scene map ────────────────────────────────────────────────────────────
  const SCENES = [
    { t:   0.0, label: '01 — Introduction' },
    { t:  21.0, label: '02 — Base Prompt' },
    { t:  31.5, label: '03 — Zero-Shot' },
    { t:  50.4, label: '04 — Role Prompting' },
    { t:  69.4, label: '05 — Few-Shot' },
    { t:  87.6, label: '06 — Chain-of-Thought' },
    { t: 109.2, label: '07 — Self-Consistency' },
    { t: 129.0, label: '08 — Tree-of-Thoughts' },
    { t: 149.3, label: '09 — ReAct' },
    { t: 168.6, label: '10 — Prompt Chaining' },
    { t: 185.6, label: '11 — Comparison' },
    { t: 231.8, label: '12 — Conclusion' },
  ];

  function currentScene(t) {
    let s = SCENES[0];
    for (const sc of SCENES) { if (t >= sc.t) s = sc; else break; }
    return s;
  }

  function fmt(s) {
    const m = Math.floor(s / 60);
    const ss = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${ss}`;
  }

  // ── Wire up after iframe loads ───────────────────────────────────────────
  const iframe    = document.getElementById('comp');
  const playBtn   = document.getElementById('playBtn');
  const restartBtn= document.getElementById('restartBtn');
  const scrubber  = document.getElementById('scrubber');
  const timecode  = document.getElementById('timecode');
  const sceneLabel= document.getElementById('scene-label');

  const TOTAL = 248.8;
  let tl, vo, playing = false, rafId;

  iframe.addEventListener('load', () => {
    const win = iframe.contentWindow;
    tl = win.__timelines?.['prompt-engineering'];
    vo = win.document.getElementById('vo');

    if (!tl || !vo) {
      sceneLabel.textContent = '⚠ Timeline not found';
      return;
    }

    tl.seek(0);
    vo.currentTime = 0;
    scrubber.max = TOTAL;

    playBtn.disabled   = false;
    restartBtn.disabled = false;
    sceneLabel.textContent = SCENES[0].label;
    timecode.textContent   = `0:00 / ${fmt(TOTAL)}`;
    sceneLabel.textContent = 'Ready — press Play';
  });

  function tick() {
    const t = vo.currentTime;
    tl.seek(t);
    scrubber.value = t;
    timecode.textContent = `${fmt(t)} / ${fmt(TOTAL)}`;
    sceneLabel.textContent = currentScene(t).label;

    if (t >= TOTAL || vo.ended) {
      stopPlay();
      return;
    }
    rafId = requestAnimationFrame(tick);
  }

  function startPlay() {
    playing = true;
    playBtn.textContent = '⏸ Pause';
    tl.seek(vo.currentTime);
    vo.play();
    rafId = requestAnimationFrame(tick);
  }

  function stopPlay() {
    playing = false;
    playBtn.textContent = '▶ Play';
    vo.pause();
    cancelAnimationFrame(rafId);
  }

  playBtn.addEventListener('click', () => {
    if (playing) stopPlay(); else startPlay();
  });

  restartBtn.addEventListener('click', () => {
    stopPlay();
    vo.currentTime = 0;
    tl.seek(0);
    sceneLabel.textContent = SCENES[0].label;
    timecode.textContent = `0:00 / ${fmt(TOTAL)}`;
    scrubber.value = 0;
    setTimeout(startPlay, 100);
  });

  scrubber.addEventListener('input', () => {
    const t = parseFloat(scrubber.value);
    const wasPlaying = playing;
    stopPlay();
    vo.currentTime = t;
    tl.seek(t);
    timecode.textContent = `${fmt(t)} / ${fmt(TOTAL)}`;
    sceneLabel.textContent = currentScene(t).label;
    if (wasPlaying) setTimeout(startPlay, 50);
  });
</script>
</body>
</html>
